<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nährwert">
<meta name="theme-color" content="#0a0a0a">
<title>Nährwert-Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --card: #111; --border: #222;
    --accent: #c8f060; --accent2: #60f0c8; --accent3: #f0c860;
    --text: #f0f0f0; --muted: #666; --red: #f06060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  input, button, select { font-family: inherit; }
  input:focus, select:focus { outline: none; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  select option { background: #111; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 40px 20px 100px; }

  /* Header */
  .tag { display:inline-block; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); border:1px solid var(--accent); padding:3px 10px; margin-bottom:16px; }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(36px,10vw,60px); font-weight:800; line-height:1.0; letter-spacing:-0.02em; }
  h1 span { color:var(--accent); }
  .sub { margin-top:10px; font-size:13px; color:var(--muted); }

  /* Search bar */
  .search-row { display:flex; border:1px solid var(--border); background:var(--card); transition:border-color .2s; margin-bottom:0; }
  .search-row.missing { border-color: var(--accent3); }
  .search-row.err { border-color: var(--red); }
  .amount-wrap { display:flex; align-items:center; gap:4px; border-right:1px solid var(--border); padding:0 12px; min-width:68px; }
  .amount-wrap input { background:none; border:none; color:var(--accent); font-size:15px; width:46px; text-align:right; }
  .unit-lbl { font-size:11px; color:var(--muted); }
  .food-input { flex:1; background:none; border:none; color:var(--text); font-size:16px; padding:15px 14px; }
  .food-input::placeholder { color: #444; }
  .search-btn { background:var(--accent); color:#000; border:none; padding:0 20px; font-family:'Syne',sans-serif; font-weight:700; font-size:13px; letter-spacing:.05em; text-transform:uppercase; cursor:pointer; min-width:80px; transition:background .15s; }
  .search-btn:active { background:#b8e050; }
  .search-btn:disabled { background:#1a1a1a; color:#444; cursor:not-allowed; }

  /* Messages */
  .msg { font-size:12px; padding:9px 2px 0; }
  .msg.red { color:var(--red); }
  .msg.green { color:var(--accent); }

  /* Added entry code */
  .entry-box { margin-top:10px; padding:10px 14px; border:1px solid #1a2e00; background:#040a00; font-size:10px; color:#4a8a4a; line-height:1.7; word-break:break-all; }
  .entry-box .lbl { color:var(--accent); }

  /* Not-found panel */
  .nf-panel { border:1px solid #3a2e00; background:#0a0800; margin-bottom:20px; animation:fadeUp .25s ease; }
  .nf-header { padding:13px 18px; border-bottom:1px solid #2a2000; display:flex; justify-content:space-between; align-items:center; }
  .nf-title { font-size:10px; color:var(--accent3); letter-spacing:.15em; text-transform:uppercase; }
  .nf-query { font-size:13px; color:var(--muted); margin-left:8px; }
  .nf-close { background:none; border:none; color:#444; font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }
  .nf-body { padding:16px 18px; }
  .nf-info { font-size:11px; color:#555; margin-bottom:14px; line-height:1.6; }
  .nf-info span { color:#888; }
  .search-web-btn { width:100%; background:var(--accent3); color:#000; border:none; padding:13px; font-family:'Syne',sans-serif; font-weight:700; font-size:13px; letter-spacing:.05em; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:background .2s; }
  .search-web-btn:active { background:#d4b040; }
  .search-web-btn:disabled { background:#1a1500; color:#555; cursor:not-allowed; }
  .spinner { width:14px; height:14px; border:2px solid #555; border-top-color:var(--accent3); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }

  /* Quick picks */
  .ql { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:#333; margin-bottom:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .chip { font-size:12px; padding:5px 12px; border:1px solid #1e1e1e; color:#555; background:none; cursor:pointer; font-family:inherit; transition:all .15s; border-radius:0; -webkit-appearance:none; }
  .chip:active { border-color:var(--accent); color:var(--accent); }
  .chip.drink { color:#2a7a6a; }
  .chip.drink:active { border-color:var(--accent2); color:var(--accent2); }
  .chip.custom { border-color:#2a2000; color:#7a6000; }
  .chip.custom:active { border-color:var(--accent3); color:var(--accent3); }

  /* Result card */
  .card { border:1px solid var(--border); background:var(--card); animation:fadeUp .3s ease; margin-bottom:16px; }
  .card.custom-card { border-color:#2a2200; }
  .card-head { padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .card-name { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; line-height:1.2; }
  .card-ai { font-size:10px; color:var(--accent3); letter-spacing:.1em; text-transform:uppercase; margin-top:3px; }
  .card-badge { font-size:11px; color:var(--muted); background:#1a1a1a; padding:4px 10px; border:1px solid var(--border); white-space:nowrap; flex-shrink:0; }
  .metrics { display:grid; grid-template-columns:1fr 1fr; }
  .metric { padding:20px; }
  .metric.br { border-right:1px solid var(--border); }
  .metric.bb { border-bottom:1px solid var(--border); }
  .metric-lbl { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .metric-val { font-family:'Syne',sans-serif; font-size:34px; font-weight:800; line-height:1; }
  .metric-val.sm { font-size:24px; color:var(--muted) !important; }
  .metric-unit { font-size:12px; font-weight:400; color:var(--muted); margin-left:2px; }
  .bar-wrap { height:3px; background:#1a1a1a; margin-top:10px; border-radius:2px; overflow:hidden; }
  .bar { height:100%; border-radius:2px; width:0; transition:width .6s cubic-bezier(.16,1,.3,1) .1s; }
  .metric-sub { font-size:11px; color:var(--muted); margin-top:5px; }
  .card-foot { padding:11px 20px; border-top:1px solid var(--border); font-size:11px; color:#333; }

  /* History */
  .hist-chips { display:flex; flex-wrap:wrap; gap:6px; }

  /* Footer */
  .footer { margin-top:48px; font-size:11px; color:#252525; text-align:center; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes barGrow { from{width:0} }
  .bar { animation:barGrow .6s cubic-bezier(.16,1,.3,1) .15s both; }
</style>
</head>

<div class="wrap">
  <!-- Header -->

    <div class="tag" id="db-tag">983 Einträge · selbstlernend</div>
    <h1>Nähr<span>wert</span><br>Finder</h1>

        <span class="unit-lbl" id="unit-lbl">g</span>
      </div>

      <button class="search-btn" id="search-btn" onclick="doSearch()">Suchen</button>
    </div>
    <div id="msg" class="msg" style="display:none"></div>
    <div id="entry-box" class="entry-box" style="display:none"></div>
  </div>

  <div class="nf-panel" id="nf-panel" style="display:none">
    <div class="nf-header">

    <div class="nf-body">

      <button class="search-web-btn" id="web-btn" onclick="doWebSearch()">✦ Im Web suchen & ergänzen</button>
    </div>
  </div>

  <!-- Quick picks -->
  <div style="margin-bottom:28px">
    <div class="ql">Lebensmittel</div>
    <div class="chips" id="chips-food"></div>
    <div class="ql">Getränke</div>
    <div class="chips" id="chips-drink"></div>
    <div id="chips-custom-wrap" style="display:none">

      <div class="chips" id="chips-custom"></div>
    </div>
  </div>

  <!-- Result -->
  <div id="result-card" style="display:none"></div>

  <!-- History -->
  <div id="history-wrap" style="display:none; margin-top:16px">
    <div class="ql">Zuletzt gesucht</div>
    <div class="hist-chips" id="history-chips"></div>
  </div>

  <div class="footer">Durchschnittliche Referenzwerte · Keine Ernährungsberatung</div>
</div>

let customDB = [];
let history = [];
const QUICK_FOOD = ["Hühnerbrust","Lachs","Burrata","Gouda","Edamame","Haferflocken","Avocado","Mandeln"];
const QUICK_DRINK = ["Wasser","Kaffee","Radler","Bier","Cola","Orangensaft","Rotwein","Smoothie"];

function findFood(query) {
  const q = query.toLowerCase().trim();
  let m = DB.find(i => i.names.some(n => n === q));
  if (m) return m;
  m = DB.find(i => i.names.some(n => n.includes(q) || q.includes(n)));
  if (m) return m;
  const words = q.split(/\s+/).filter(w => w.length > 2);
  return DB.find(i => i.names.some(n => words.some(w => n.includes(w)))) || null;
}

function findAll(q) {
  const lower = q.toLowerCase().trim();
  return findFood(q) || customDB.find(i => i.names.some(n => n === lower || n.includes(lower) || lower.includes(n))) || null;
}

function autoKat(name) {
  const n = name.toLowerCase();
  if (/wasser|saft|bier|wein|kaffee|tee|cola|sekt|shake|limo|schnaps|vodka|rum|gin|drink|kombucha|kefir/.test(n)) return {kat:"Getränke",liquid:true};
  if (/käse|joghurt|quark|milch|sahne|butter|burrata|mozzarella|ricotta|skyr/.test(n)) return {kat:"Milchprodukte",liquid:false};
  if (/fleisch|wurst|steak|filet|hack|lachs|fisch|thun|garnele|chicken|huhn/.test(n)) return {kat:"Fleisch & Fisch",liquid:false};
  if (/schokolade|kuchen|keks|eis|chips|gummi|torte/.test(n)) return {kat:"Süßes & Snacks",liquid:false};
  return {kat:"Sonstiges",liquid:false};
}

let currentMissing = null;

function updateDbTag() {
  document.getElementById('db-tag').textContent = (DB.length + customDB.length) + ' Einträge · selbstlernend';
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (type||'');
  el.style.display = text ? 'block' : 'none';
}

function pct(v, m) { return Math.min(Math.round((v/m)*100), 100); }

function doSearch(overrideFood, overrideAmount) {
  const f = (overrideFood ?? document.getElementById('food-input').value).trim();
  const a = overrideAmount ?? parseInt(document.getElementById('amount').value) || 100;
  if (!f) { showMsg('Bitte ein Lebensmittel eingeben.', 'red'); return; }

  showMsg('', '');
  document.getElementById('entry-box').style.display = 'none';
  document.getElementById('nf-panel').style.display = 'none';
  document.getElementById('search-row').className = 'search-row';
  document.getElementById('result-card').style.display = 'none';

  const found = findAll(f);
  if (found) {
    renderResult(found, f, a);
    addHistory(f, a);
    return;
  }

  // Not found
  document.getElementById('search-row').className = 'search-row missing';
  document.getElementById('nf-query').textContent = '„' + f + '"';
  document.getElementById('nf-panel').style.display = 'block';
  currentMissing = { query: f, amount: a, ...autoKat(f) };
}

function closeNF() {
  document.getElementById('nf-panel').style.display = 'none';
  document.getElementById('search-row').className = 'search-row';
  currentMissing = null;
}

function renderResult(found, f, a) {
  const factor = a / 100;
  const name = (found.displayName || found.names[0]);
  const dispName = name.charAt(0).toUpperCase() + name.slice(1);
  const liquid = found.liquid || false;
  const kcal = Math.round(found.kcal * factor);
  const protein = +(found.protein * factor).toFixed(1);
  const carbs = +(found.carbs * factor).toFixed(1);
  const fat = +(found.fat * factor).toFixed(1);

  document.getElementById('unit-lbl').textContent = liquid ? 'ml' : 'g';

  const isCustom = found.custom || false;
  const borderColor = isCustom ? '#2a2200' : '#222';

  document.getElementById('result-card').innerHTML = `
    <div class="card ${isCustom?'custom-card':''}" style="border-color:${borderColor}">
      <div class="card-head" style="border-bottom-color:${borderColor}">
        <div>
          <div class="card-name">${dispName}</div>
          ${isCustom ? `<div class="card-ai">✦ Web · ${found.kategorie||''}</div>` : ''}
        </div>
        <div class="card-badge">${a} ${liquid?'ml':'g'}</div>
      </div>
      <div class="metrics">
        <div class="metric br bb">
          <div class="metric-lbl">Kalorien</div>
          <div class="metric-val" style="color:#c8f060">${kcal}<span class="metric-unit">kcal</span></div>
          <div class="bar-wrap"><div class="bar" style="width:${pct(kcal,DAILY.kcal)}%;background:#c8f060"></div></div>
          <div class="metric-sub">≈ ${pct(kcal,DAILY.kcal)}% Tagesbedarf</div>
        </div>
        <div class="metric bb">
          <div class="metric-lbl">Protein</div>
          <div class="metric-val" style="color:#60f0c8">${protein}<span class="metric-unit">g</span></div>
          <div class="bar-wrap"><div class="bar" style="width:${pct(protein,DAILY.protein)}%;background:#60f0c8"></div></div>
          <div class="metric-sub">≈ ${pct(protein,DAILY.protein)}% Tagesbedarf</div>
        </div>
        <div class="metric br">
          <div class="metric-lbl">Kohlenhydrate</div>
          <div class="metric-val sm">${carbs}<span class="metric-unit">g</span></div>
        </div>
        <div class="metric">
          <div class="metric-lbl">Fett</div>
          <div class="metric-val sm">${fat}<span class="metric-unit">g</span></div>
        </div>
      </div>
      <div class="card-foot" style="border-top-color:${borderColor}">
        Referenzwerte pro ${a} ${liquid?'ml':'g'} · Tagesbedarf: 2000 kcal / 50g Protein
      </div>
    </div>`;
  document.getElementById('result-card').style.display = 'block';
}

function addHistory(f, a) {
  const key = f + '||' + a;
  history = [{key, food:f, amount:a}, ...history.filter(h => h.key !== key)].slice(0, 8);
  renderHistory();
}

function renderHistory() {
  const wrap = document.getElementById('history-wrap');
  const el = document.getElementById('history-chips');
  if (!history.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  el.innerHTML = history.map(h =>
    `<button class="chip" onclick="quickSearch('${h.food.replace(/'/g,"\\'")}',${h.amount})">${h.food} (${h.amount}g)</button>`
  ).join('');
}

function quickSearch(food, amount) {
  document.getElementById('food-input').value = food;
  document.getElementById('amount').value = amount;
  doSearch(food, amount);
}

function doWebSearch() {
  if (!currentMissing) return;
  const btn = document.getElementById('web-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Websuche läuft…';

  const query = currentMissing.query;
  const cbName = '_off_' + Date.now();
  const timeout = setTimeout(() => {
    delete window[cbName];
    btn.disabled = false;
    btn.innerHTML = '✦ Im Web suchen & ergänzen';
    showMsg('Keine Ergebnisse gefunden. Anderen Begriff versuchen.', 'red');
    document.getElementById('nf-panel').style.display = 'none';
  }, 8000);

  window[cbName] = function(data) {
    clearTimeout(timeout);
    delete window[cbName];
    btn.disabled = false;
    btn.innerHTML = '✦ Im Web suchen & ergänzen';

    const products = (data.products || []).filter(p => {
      const n = p.nutriments;
      return n && (n['energy-kcal_100g'] || n['energy-kcal']);
    });

    if (!products.length) {
      showMsg(`„${query}" nicht gefunden. Anderen Begriff versuchen.`, 'red');
      document.getElementById('nf-panel').style.display = 'none';
      return;
    }

    products.sort((a, b) => (a.product_name||'').length - (b.product_name||'').length);
    const p = products[0];
    const n = p.nutriments;
    const entry = {
      names: [query.toLowerCase()],
      kcal: Math.round(n['energy-kcal_100g'] || n['energy-kcal'] || 0),
      protein: +((n['proteins_100g']||0).toFixed(1)),
      carbs: +((n['carbohydrates_100g']||0).toFixed(1)),
      fat: +((n['fat_100g']||0).toFixed(1)),
      liquid: currentMissing.liquid,
      kategorie: currentMissing.kat,
      custom: true,
      displayName: query.charAt(0).toUpperCase() + query.slice(1),
      source: p.product_name_de || p.product_name || query,
    };

    customDB.push(entry);
    updateDbTag();

    // Add to custom chips
    const chips = document.getElementById('chips-custom');
    const wrap = document.getElementById('chips-custom-wrap');
    const label = entry.displayName;
    chips.innerHTML += `<button class="chip custom" onclick="quickSearch('${query.replace(/'/g,"\\'")}',${currentMissing.amount})">${label}</button>`;
    wrap.style.display = 'block';

    // Show entry code
    const code = `{ names: ["${entry.names[0]}"], kcal: ${entry.kcal}, protein: ${entry.protein}, carbs: ${entry.carbs}, fat: ${entry.fat}${entry.liquid?', liquid: true':''} }`;
    const box = document.getElementById('entry-box');
    box.innerHTML = `<span class="lbl">✦ DB +1 (${DB.length + customDB.length} Einträge) &nbsp;</span><code>${code}</code><br><span style="color:#333;font-size:10px">Quelle: ${entry.source}</span>`;
    box.style.display = 'block';

    document.getElementById('nf-panel').style.display = 'none';
    document.getElementById('search-row').className = 'search-row';
    renderResult(entry, query, currentMissing.amount);
    addHistory(query, currentMissing.amount);
    currentMissing = null;
  };

  const script = document.createElement('script');
  script.src = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=10&callback=${cbName}`;
  script.onerror = () => {
    clearTimeout(timeout);
    delete window[cbName];
    btn.disabled = false;
    btn.innerHTML = '✦ Im Web suchen & ergänzen';
    showMsg('Netzwerkfehler. Bitte erneut versuchen.', 'red');
  };
  document.head.appendChild(script);
  setTimeout(() => script.remove(), 9000);
}

// Enter key
document.getElementById('food-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Init quick chips
QUICK_FOOD.forEach(q => {
  document.getElementById('chips-food').innerHTML +=
    `<button class="chip" onclick="quickSearch('${q}',document.getElementById('amount').value||100)">${q}</button>`;
});
QUICK_DRINK.forEach(q => {
  document.getElementById('chips-drink').innerHTML +=
    `<button class="chip drink" onclick="quickSearch('${q}',document.getElementById('amount').value||100)">${q}</button>`;
});
</script>
</body>
</html>
